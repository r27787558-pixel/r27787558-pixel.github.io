<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山竹的个人主页</title>
    <style>
        /* 整体背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* 个人卡片 */
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            width: 85%;
            max-width: 400px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 网名 */
        h1 {
            margin: 0;
            font-size: 28px;
            color: #2c3e50;
        }

        .tag {
            display: inline-block;
            background: #e1e8f0;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 14px;
            margin-top: 10px;
            color: #5d6d7e;
        }

        /* 详细信息 */
        .info-list {
            margin: 25px 0;
            text-align: left;
        }

        .info-item {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }

        .label {
            font-weight: bold;
            color: #7f8c8d;
            font-size: 13px;
            display: block;
        }

        .value {
            font-size: 16px;
            color: #2c3e50;
            word-break: break-all;
        }

        /* 非二元旗装饰条 */
        .nb-flag {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12px;
            display: flex;
            flex-direction: column;
        }

        .flag-stripe { height: 25%; width: 100%; }
        .yellow { background-color: #FFF433; } /* 黄 */
        .white  { background-color: #FFFFFF; } /* 白 */
        .purple { background-color: #9B59B6; } /* 紫 */
        .black  { background-color: #2C2C2C; } /* 黑 */

    </style>
</head>
<body>

    <div class="card">
        <h1>汐沫</h1>
        <div class="tag">16岁 · mtx.</div>

        <div class="info-list">
            <div class="info-item">
                <span class="label">QQ 号码</span>
                <span class="value">2132248873</span>
            </div>
            <div class="info-item">
                <span class="label">电话号码</span>
                <span class="value">19217264755</span>
            </div>
        </div>

        <p style="font-size: 14px; color: #95a5a6;">很高兴认识你</p>

        <div class="nb-flag">
            <div class="flag-stripe yellow"></div>
            <div class="flag-stripe white"></div>
            <div class="flag-stripe purple"></div>
            <div class="flag-stripe black"></div>
        </div>
    </div>

</body>
</html>
