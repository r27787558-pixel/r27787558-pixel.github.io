<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汐沫的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #E8E8F0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 页面内容 */
        .page-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        .profile-card {
            position: relative;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
        }

        /* 旗子背景部分 */
        .flag-background {
            width: 100%;
            height: 150px;
            background: linear-gradient(
                to bottom,
                #FFD700 0%,      /* 黄色 */
                #FFD700 25%,
                #FFFFFF 25%,     /* 白色 */
                #FFFFFF 50%,
                #9C4DC4 50%,     /* 紫色 */
                #9C4DC4 75%,
                #000000 75%,     /* 黑色 */
                #000000 100%
            );
        }

        /* 信息内容部分 */
        .profile-info-section {
            padding: 30px;
        }

        .profile-name {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .profile-meta {
            background: #E8E8F0;
            border-radius: 15px;
            padding: 8px 16px;
            display: inline-block;
            color: #999;
            margin-bottom: 30px;
            font-size: 0.95rem;
            margin-left: auto;
            margin-right: auto;
            display: block;
            text-align: center;
        }

        .info-item {
            margin-bottom: 25px;
        }

        .info-label {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .info-value {
            color: #333;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .footer-text {
            text-align: center;
            color: #BBB;
            font-size: 0.95rem;
            margin-top: 30px;
        }

        @media (max-width: 480px) {
            .profile-name {
                font-size: 2rem;
            }

            .profile-info-section {
                padding: 25px;
            }

            .flag-background {
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- 页面内容 -->
    <div class="page-content">
        <div class="header">
            ⚡ 汐沫的个人主页
        </div>

        <div class="profile-card">
            <!-- 旗子背景 -->
            <div class="flag-background"></div>

            <!-- 信息内容 -->
            <div class="profile-info-section">
                <div class="profile-name">汐沫</div>
                <div class="profile-meta">16岁 · mtx.</div>

                <div class="info-item">
                    <div class="info-label">QQ 号码</div>
                    <div class="info-value">2132248873</div>
                </div>

                <div class="info-item">
                    <div class="info-label">电话号码</div>
                    <div class="info-value">19217264755</div>
                </div>

                <div class="footer-text">很高兴认识你</div>
            </div>
        </div>
    </div>
</body>
</html>
