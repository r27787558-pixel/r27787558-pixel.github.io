<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汐沫的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #E8E8F0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* 原页面内容 */
        .page-content {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            z-index: 1;
        }

        .header {
            background: linear-gradient(135deg, #E8E8F0 0%, #D0D0E0 100%);
            padding: 20px;
            text-align: center;
            color: #666;
        }

        .profile-card {
            background: white;
            border-radius: 30px;
            margin: 30px 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .profile-name {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .profile-info {
            background: #E8E8F0;
            border-radius: 15px;
            padding: 8px 16px;
            display: inline-block;
            color: #999;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .info-item {
            margin-bottom: 25px;
        }

        .info-label {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .info-value {
            color: #333;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .footer-text {
            text-align: center;
            color: #BBB;
            font-size: 0.95rem;
            margin: 30px 0;
        }

        /* 非二元旗覆盖层 */
        .flag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                #FFD700 0%,      /* 黄色 */
                #FFD700 25%,
                #FFFFFF 25%,     /* 白色 */
                #FFFFFF 50%,
                #9C4DC4 50%,     /* 紫色 */
                #9C4DC4 75%,
                #000000 75%,     /* 黑色 */
                #000000 100%
            );
            z-index: 9999;
            pointer-events: none;
        }

        .flag-overlay.hidden {
            display: none;
        }

        /* 显示/隐藏按钮 */
        .toggle-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700, #9C4DC4);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .toggle-button:hover {
            transform: scale(1.1);
        }

        .toggle-button:active {
            transform: scale(0.95);
        }

        @media (max-width: 480px) {
            .profile-name {
                font-size: 2rem;
            }

            .profile-card {
                margin: 20px 15px;
                padding: 30px 20px;
            }

            .toggle-button {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 非二元旗覆盖层 -->
    <div class="flag-overlay" id="flagOverlay"></div>

    <!-- 页面内容 -->
    <div class="page-content">
        <div class="header">
            ⚡ 汐沫的个人主页
        </div>

        <div class="profile-card">
            <div class="profile-name">汐沫</div>
            <div class="profile-info">16岁 · mtx.</div>

            <div class="info-item">
                <div class="info-label">QQ 号码</div>
                <div class="info-value">2132248873</div>
            </div>

            <div class="info-item">
                <div class="info-label">电话号码</div>
                <div class="info-value">19217264755</div>
            </div>

            <div class="footer-text">很高兴认识你</div>
        </div>
    </div>

    <!-- 显示/隐藏旗子按钮 -->
    <button class="toggle-button" id="toggleBtn" onclick="toggleFlag()">🚩</button>

    <script>
        function toggleFlag() {
            const flagOverlay = document.getElementById('flagOverlay');
            flagOverlay.classList.toggle('hidden');
        }
    </script>
</body>
            </html>
